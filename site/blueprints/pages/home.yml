title: Home

options:
  changeSlug: false
  changeStatus: false
  delete: false

columns:
  - width: 1/2
    fields:
      hero_title:
        type: writer
        label: Heading
        marks:
          - italic

      hero_availability_status:
        type: select
        label: Status
        default: available
        width: 1/4
        options:
          blocked: Blocked
          available: Available
          hold: Hold

      hero_eyebrow:
        type: text
        label: Eyebrow
        default: Available for freelance work
        width: 3/4

      hero_button_label:
        type: text
        label: Button Label
        default: Information
        width: 1/2

      hero_button_link:
        type: link
        label: Button Link
        width: 1/2
        options:
          - page
          - url

  - width: 1/2
    sections:
      featured:
        type: fields
        fields:
          featured_projects:
            type: pages
            label: Projects
            multiple: true
            query: site.find('projects').children.listed
            max: 6
            layout: cardlets
            size: medium
            image:
              ratio: 16/9
              cover: true
