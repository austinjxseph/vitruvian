title: About

columns:
  - width: 2/3
    fields:
      about_images:
        type: files
        label: Images
        multiple: true

      about_items:
        type: blocks
        label: Body
        fieldsets:
          - b-margin-header
          - b-margin-text

  - width: 1/3
    sticky: true
    fields:
      meta_title:
        type: text
        label: Page Title

      meta_description:
        type: textarea
        label: Meta Description
        buttons: false

      meta_image:
        type: files
        label: OpenGraph Image
        multiple: false
        max: 1
